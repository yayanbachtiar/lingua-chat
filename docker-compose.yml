# =============================================================================
# LinguaChat — AI Language Learning Buddy
# Docker Compose — Development & Production
# =============================================================================
#
# Usage:
#   docker compose up -d                    # Start in background
#   docker compose logs -f                  # Tail logs
#   docker compose down                     # Stop
#   docker compose up --build -d            # Rebuild & start
# =============================================================================

services:
  lingua-chat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lingua-chat
    restart: unless-stopped
    ports:
      - "${PORT:-8501}:8501"
    env_file:
      - .env
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=5
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
