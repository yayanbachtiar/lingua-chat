<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaChat Widget</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f0f2f5;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
  }

  /* ── Open Widget Button ── */
  #lc-bubble {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #2563eb;
    color: #fff;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(37, 99, 235, 0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    transition: transform 0.2s, box-shadow 0.2s;
    z-index: 9999;
  }
  #lc-bubble:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(37, 99, 235, 0.45); }
  #lc-bubble svg { width: 28px; height: 28px; fill: currentColor; }

  /* ── Chat Popup ── */
  #lc-popup {
    position: fixed;
    bottom: 100px;
    right: 24px;
    width: 380px;
    max-height: 600px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    display: none;
    flex-direction: column;
    z-index: 9998;
    overflow: hidden;
    animation: lc-slide-up 0.25s ease-out;
  }
  #lc-popup.open { display: flex; }

  @keyframes lc-slide-up {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Header ── */
  #lc-header {
    background: #2563eb;
    color: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #lc-header h3 { font-size: 16px; font-weight: 600; }
  #lc-header button {
    background: none;
    border: none;
    color: inherit;
    font-size: 22px;
    cursor: pointer;
    opacity: 0.8;
    line-height: 1;
    padding: 0 4px;
  }
  #lc-header button:hover { opacity: 1; }

  /* ── Messages ── */
  #lc-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 280px;
    max-height: 400px;
    background: #f8f9fb;
  }
  .lc-msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.5;
    word-wrap: break-word;
    animation: lc-fade-in 0.2s ease-out;
  }
  @keyframes lc-fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .lc-user {
    background: #2563eb;
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .lc-bot {
    background: #e9ecf1;
    color: #1a1a2e;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .lc-typing {
    background: #e9ecf1;
    color: #888;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 12px 16px;
  }
  .lc-typing span {
    width: 6px; height: 6px; border-radius: 50%; background: #888;
    animation: lc-bounce 1.2s infinite;
  }
  .lc-typing span:nth-child(2) { animation-delay: 0.2s; }
  .lc-typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes lc-bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  /* ── Input ── */
  #lc-input-area {
    display: flex;
    padding: 12px 16px;
    border-top: 1px solid #e5e7eb;
    background: #fff;
    gap: 8px;
  }
  #lc-input {
    flex: 1;
    border: 1px solid #d1d5db;
    border-radius: 24px;
    padding: 10px 16px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  #lc-input:focus { border-color: #2563eb; }
  #lc-send {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: #2563eb;
    color: #fff;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  #lc-send:hover { background: #1d4ed8; }
  #lc-send:disabled { background: #93c5fd; cursor: not-allowed; }
  #lc-send svg { width: 18px; height: 18px; fill: currentColor; }

  /* ── Welcome ── */
  .lc-welcome {
    text-align: center;
    padding: 32px 20px;
    color: #6b7280;
  }
  .lc-welcome p { font-size: 14px; line-height: 1.6; }

  @media (max-width: 480px) {
    #lc-popup { right: 12px; left: 12px; bottom: 88px; width: auto; }
    #lc-bubble { right: 16px; bottom: 16px; }
  }
</style>
</head>
<body>

<!-- Bubble Button -->
<button id="lc-bubble" aria-label="Open chat" onclick="toggleChat()">
  <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/><path d="M7 9h10v2H7zm0-3h10v2H7zm0 6h7v2H7z"/></svg>
</button>

<!-- Chat Popup -->
<div id="lc-popup">
  <div id="lc-header">
    <h3>💬 LinguaChat</h3>
    <button onclick="toggleChat()" aria-label="Close">&times;</button>
  </div>
  <div id="lc-messages">
    <div class="lc-welcome" id="lc-welcome">
      <p style="font-size:28px;margin-bottom:12px;">👋</p>
      <p><strong>Hi there!</strong><br>Ask me anything — I'm here to help.</p>
    </div>
  </div>
  <div id="lc-input-area">
    <input id="lc-input" type="text" placeholder="Type your message..." autocomplete="off" onkeydown="if(event.key==='Enter') sendMessage()">
    <button id="lc-send" onclick="sendMessage()" aria-label="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const API_URL = window.LC_API_URL || '/api/chat';
let chatHistory = [];

function toggleChat() {
  const popup = document.getElementById('lc-popup');
  const isOpen = popup.classList.toggle('open');
  if (isOpen) setTimeout(() => document.getElementById('lc-input').focus(), 300);
}

function addMessage(text, role) {
  const container = document.getElementById('lc-messages');
  const welcome = document.getElementById('lc-welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = 'lc-msg ' + (role === 'user' ? 'lc-user' : 'lc-bot');
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('lc-messages');
  const div = document.createElement('div');
  div.className = 'lc-msg lc-typing';
  div.id = 'lc-typing-indicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('lc-typing-indicator');
  if (el) el.remove();
}

async function sendMessage() {
  const input = document.getElementById('lc-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  document.getElementById('lc-send').disabled = true;
  addMessage(text, 'user');
  showTyping();

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        config: { focus_mode: 'helpbox' },
        messages: chatHistory,
        user_input: text,
      }),
    });

    if (!res.ok) {
      const err = await res.json();
      hideTyping();
      addMessage('Sorry, something went wrong: ' + (err.detail || 'unknown error'), 'bot');
      return;
    }

    const data = await res.json();
    hideTyping();
    const reply = data.response || 'No response from AI.';
    addMessage(reply, 'bot');
    chatHistory.push({ role: 'user', content: text });
    chatHistory.push({ role: 'assistant', content: reply });
  } catch (err) {
    hideTyping();
    addMessage('Connection error. Please check your network and try again.', 'bot');
  } finally {
    document.getElementById('lc-send').disabled = false;
    input.focus();
  }
}
</script>

</body>
</html>
